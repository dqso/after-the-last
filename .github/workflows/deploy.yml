name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build WASM
        env:
          GOOS: js
          GOARCH: wasm
        run: go build -ldflags "-X main.version=$(git describe --tags --always --dirty)" -o docs/after-the-last.wasm ./

      - name: Copy wasm_exec.js
        run: |
          GOROOT=$(go env GOROOT)
          if [ -f "$GOROOT/lib/wasm/wasm_exec.js" ]; then
            cp "$GOROOT/lib/wasm/wasm_exec.js" docs/wasm_exec.js
          else
            cp "$GOROOT/misc/wasm/wasm_exec.js" docs/wasm_exec.js
          fi

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
